name: Release

on:
  push:
    branches:
      - main
      - staging
  release:
    types:
      - published

concurrency:
  group: release-${{ github.workflow }}-${{ github.event.release.tag_name || github.ref }}
  cancel-in-progress: false

env:
  SHARED_RELEASE_REF: v1
  PACKAGE_NAME: '@calan-co/doc-vader'
  REGISTRY_URL: https://npm.pkg.github.com
  NODE_VERSION: '22'
  STABLE_BRANCH: main

jobs:
  version:
    if: github.event_name == 'push' && github.ref_name == 'main'
    uses: calan-co/cicd-shared-pipeline/.github/workflows/reusable-node-package-release.yml@v1
    permissions:
      contents: write
      pull-requests: write
    secrets: inherit
    with:
      mode: version
      package-name: ${{ env.PACKAGE_NAME }}
      registry-url: ${{ env.REGISTRY_URL }}
      node-version: ${{ env.NODE_VERSION }}
      stable-branch: ${{ env.STABLE_BRANCH }}

  publish-staging-prerelease:
    if: github.event_name == 'push' && github.ref_name == 'staging'
    uses: calan-co/cicd-shared-pipeline/.github/workflows/reusable-node-package-release.yml@v1
    permissions:
      contents: read
      packages: write
    secrets: inherit
    with:
      mode: staging
      package-name: ${{ env.PACKAGE_NAME }}
      registry-url: ${{ env.REGISTRY_URL }}
      node-version: ${{ env.NODE_VERSION }}
      stable-branch: ${{ env.STABLE_BRANCH }}

  publish-release:
    if: github.event_name == 'release'
    uses: calan-co/cicd-shared-pipeline/.github/workflows/reusable-node-package-release.yml@v1
    permissions:
      contents: write
      packages: write
    secrets: inherit
    with:
      mode: release
      package-name: ${{ env.PACKAGE_NAME }}
      registry-url: ${{ env.REGISTRY_URL }}
      node-version: ${{ env.NODE_VERSION }}
      stable-branch: ${{ env.STABLE_BRANCH }}
      release-tag: ${{ github.event.release.tag_name }}
      release-prerelease: ${{ github.event.release.prerelease }}
