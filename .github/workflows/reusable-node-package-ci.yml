name: Reusable Node Package CI

on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js major version
        required: false
        default: "24"
        type: string
      working-directory:
        description: Working directory for run steps
        required: false
        default: "."
        type: string
      install-command:
        description: Install command executed in each job
        required: false
        default: pnpm install --frozen-lockfile
        type: string
      lint-command:
        description: Lint command
        required: false
        default: pnpm run lint
        type: string
      typecheck-command:
        description: Type-check command
        required: false
        default: pnpm exec tsc --noEmit
        type: string
      docs-command:
        description: Docs/API guard command
        required: false
        default: pnpm run docs:lint
        type: string
      backlog-command:
        description: Backlog/work-item frontmatter command
        required: false
        default: pnpm run backlog:validate:ci
        type: string
      test-command:
        description: Test command
        required: false
        default: pnpm run test -- --run
        type: string
      build-command:
        description: Build command
        required: false
        default: pnpm run build
        type: string
      test-matrix-node-versions:
        description: JSON array of Node versions used for matrix tests
        required: false
        default: '["22", "24"]'
        type: string
      test-matrix-os:
        description: JSON array of runner labels used for matrix tests
        required: false
        default: '["ubuntu-latest", "macos-latest", "windows-latest"]'
        type: string
      changeset-exempt-path-prefixes:
        description: Space-delimited path prefixes exempt from changeset requirement
        required: false
        default: "docs/ backlog/ README.md CHANGELOG.md LICENSE .github/"
        type: string
      require-changeset:
        description: Enforce changeset for release-impacting PR changes
        required: false
        default: true
        type: boolean
      enable-lint:
        description: Enable lint job
        required: false
        default: true
        type: boolean
      enable-type-check:
        description: Enable type-check job
        required: false
        default: true
        type: boolean
      enable-backlog-check:
        description: Enable backlog/work-item validation job
        required: false
        default: true
        type: boolean
      enable-docs-check:
        description: Enable docs API guard job
        required: false
        default: true
        type: boolean
      enable-tests:
        description: Enable test matrix job
        required: false
        default: true
        type: boolean
      enable-build:
        description: Enable build job
        required: false
        default: true
        type: boolean
      enable-changeset-check:
        description: Enable changeset gate job
        required: false
        default: true
        type: boolean

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  install:
    name: Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm

      - name: Install dependencies
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.install-command }}

  lint:
    name: Lint
    if: inputs.enable-lint
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm

      - name: Install dependencies
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.install-command }}

      - name: Run lint
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.lint-command }}

  type-check:
    name: Type Check
    if: inputs.enable-type-check
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm

      - name: Install dependencies
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.install-command }}

      - name: Type check
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.typecheck-command }}

  lint-work-item-frontmatter:
    name: Lint Work Item Frontmatter
    if: inputs.enable-backlog-check
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm

      - name: Install dependencies
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.install-command }}

      - name: Validate work items
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.backlog-command }}

      - name: Upload backlog audit artifact
        if: always() && hashFiles('backlog/audit/auditing-backlog-report.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: backlog-audit-report
          path: backlog/audit/auditing-backlog-report.json

  require-changeset:
    name: Require Changeset
    if: inputs.enable-changeset-check
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enforce Changeset for released artifacts
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          REQUIRE_CHANGESET: ${{ inputs.require-changeset }}
          EXEMPT_PREFIXES: ${{ inputs.changeset-exempt-path-prefixes }}
        run: |
          if [ "$REQUIRE_CHANGESET" != "true" ]; then
            echo "Changeset requirement disabled"
            exit 0
          fi

          if [ "$EVENT_NAME" != "pull_request" ]; then
            echo "Not a pull_request event; skipping changeset requirement"
            exit 0
          fi

          if [ -z "$BASE_REF" ]; then
            echo "No base_ref set; skipping changeset requirement"
            exit 0
          fi

          git fetch origin "$BASE_REF" --depth=1

          CHANGED_FILES="$(git diff --name-only "origin/$BASE_REF...HEAD")"
          echo "Changed files:"
          echo "$CHANGED_FILES"

          if [ -z "$CHANGED_FILES" ]; then
            echo "No changed files detected"
            exit 0
          fi

          REQUIRES_CHANGESET=0
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            IS_EXEMPT=0
            for prefix in $EXEMPT_PREFIXES; do
              case "$file" in
                "$prefix"*)
                  IS_EXEMPT=1
                  break
                  ;;
              esac
            done
            if [ "$IS_EXEMPT" -eq 0 ]; then
              REQUIRES_CHANGESET=1
              break
            fi
          done <<< "$CHANGED_FILES"

          if [ "$REQUIRES_CHANGESET" -eq 0 ]; then
            echo "Only exempt paths changed; no changeset required"
            exit 0
          fi

          CHANGESET_DIFF_COUNT="$(printf '%s\n' "$CHANGED_FILES" | grep -E '^\.changeset/[^/]+\.md$' | grep -vE '^\.changeset/README\.md$' | wc -l | tr -d ' ')"
          if [ "$CHANGESET_DIFF_COUNT" -lt 1 ]; then
            echo "::error::Release-impacting PR changes detected, but no .changeset/*.md file was added/modified in this PR"
            exit 1
          fi

          echo "Changeset requirement satisfied ($CHANGESET_DIFF_COUNT changeset file(s) changed in PR)"

  docs-api-guard:
    name: Docs API Guard
    if: inputs.enable-docs-check
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm

      - name: Install dependencies
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.install-command }}

      - name: Run docs lint
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.docs-command }}

  test:
    name: Test (Node ${{ matrix.node-version }}, ${{ matrix.os }})
    if: inputs.enable-tests
    runs-on: ${{ matrix.os }}
    needs: install
    strategy:
      matrix:
        node-version: ${{ fromJSON(inputs.test-matrix-node-versions) }}
        os: ${{ fromJSON(inputs.test-matrix-os) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.install-command }}

      - name: Run tests
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.test-command }}

  build:
    name: Build
    runs-on: ubuntu-latest
    needs:
      - lint
      - type-check
      - lint-work-item-frontmatter
      - require-changeset
      - docs-api-guard
      - test
    if: >-
      ${{
        inputs.enable-build &&
        always() &&
        (needs.lint.result == 'success' || needs.lint.result == 'skipped') &&
        (needs.type-check.result == 'success' || needs.type-check.result == 'skipped') &&
        (needs.lint-work-item-frontmatter.result == 'success' || needs.lint-work-item-frontmatter.result == 'skipped') &&
        (needs.docs-api-guard.result == 'success' || needs.docs-api-guard.result == 'skipped') &&
        (needs.test.result == 'success' || needs.test.result == 'skipped') &&
        (needs.require-changeset.result == 'success' || needs.require-changeset.result == 'skipped')
      }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm

      - name: Install dependencies
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.install-command }}

      - name: Build package
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.build-command }}
